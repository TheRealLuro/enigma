services:
  redis:
    image: redis:7.4-alpine
    container_name: enigma-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 768mb
      - --maxmemory-policy
      - allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    mem_limit: "1g"
    cpus: "1.00"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  enigma-server:
    build:
      context: .
    container_name: enigma-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
      MONGO_MAX_POOL_SIZE: "200"
      MONGO_MIN_POOL_SIZE: "0"
      MONGO_WAIT_QUEUE_TIMEOUT_MS: "2500"
      MONGO_SERVER_SELECTION_TIMEOUT_MS: "5000"
      MONGO_CONNECT_TIMEOUT_MS: "5000"
      MONGO_SOCKET_TIMEOUT_MS: "15000"
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: "6g"
    cpus: "3.00"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    command:
      - uvicorn
      - main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --loop
      - uvloop
      - --http
      - httptools
      - --ws
      - websockets
      - --backlog
      - "2048"
      - --timeout-keep-alive
      - "30"
    ports:
      - "8000:8000"

volumes:
  redis_data:
